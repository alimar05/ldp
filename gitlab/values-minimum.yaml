# resources-template: &resources-template
#   resources:
#     limits:
#       cpu: 1
#       memory: 2Gi
#     requests:
#       cpu: 100m
#       memory: 128Mi

global:
  edition: ce
  ingress:
    configureCertmanager: false
    class: nginx
    enabled: true
    tls:
      enabled: true
      secretName: wildcard-local-tls
  hosts:
    https: true
    domain: gitlab.local
    gitlab:
      name: gitlab.local
### Настройка внешнего postgres. Взято отсюда https://gitlab.com/gitlab-org/charts/gitlab/-/blob/master/examples/values-external-database.yaml
  psql:
    host: postgresql.postgresql.svc.cluster.local
    password:
      secret: external-postgresql-secret # https://gitlab.com/gitlab-org/charts/gitlab/blob/master/doc/installation/secrets.md#postgresql-secret
      key: secret
    port: 5432
    database: gitlab
    username: gitlab
postgresql:
  install: false
### Настройка внешнего obs. Взято отсюда https://gitlab.com/gitlab-org/charts/gitlab/-/blob/master/examples/values-external-objectstorage.yaml
  minio:
    enabled: false
  appConfig:
    artifacts:
      bucket: gitlab-artifacts-storage
    backups:
      bucket: gitlab-backup-storage
      tmpBucket: gitlab-tmp-storage
    lfs:
      bucket: gitlab-lfs-storage
    object_store:
      connection:
        secret: gitlab-object-storage # https://gitlab.com/gitlab-org/charts/gitlab/-/blob/master/examples/objectstorage/rails.minio.yaml
      enabled: true
      proxy_download: false
    packages:
      bucket: gitlab-packages-storage
    uploads:
      bucket: gitlab-uploads-storage
  registry:
    bucket: gitlab-registry-storage
registry:
  storage:
    secret: gitlab-registry-storage # https://gitlab.com/gitlab-org/charts/gitlab/-/blob/master/examples/objectstorage/registry.minio.yaml
    key: config


  # Disable Rails bootsnap cache (temporary)
  rails:
    bootsnap:
      enabled: false
  shell:
    # Configure the clone link in the UI to include the high-numbered NodePort
    # value from below (`gitlab.gitlab-shell.service.nodePort`)
    port: 32022

# Don't use certmanager, we'll self-sign
installCertmanager: false

nginx-ingress:
  enabled: false
  controller:
    replicaCount: 1
prometheus:
  install: false

## Installation & configuration of gitlab/gitlab-runner
## See dependencies in Chart.yaml for current version
gitlab-runner:
  gitlabUrl: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181
  runners:
    config: |
      [[runners]]
        url = "http://gitlab-webservice-default.gitlab.svc.cluster.local:8181"
        clone_url = "http://gitlab-webservice-default.gitlab.svc.cluster.local:8181" 
        [runners.kubernetes]
        image = "ubuntu:22.04"
        # "arm64" или "x86_64" зависит от платформы
        helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:arm64-v18.6.3"
        {{- if .Values.global.minio.enabled }}
        [runners.cache]
          Type = "s3"
          Path = "gitlab-runner"
          Shared = true
          [runners.cache.s3]
            ServerAddress = {{ include "gitlab-runner.cache-tpl.s3ServerAddress" . }}
            BucketName = "runner-cache"
            BucketLocation = "us-east-1"
            Insecure = false
        {{ end }}
# Reduce replica counts, reducing CPU & memory requirements
gitlab:
  registry:
    enabled: true
    hpa:
      minReplicas: 1
      maxReplicas: 1
  gitlab-exporter:
    enabled: false
  toolbox:
    enabled: false
  kas:
    minReplicas: 1
    maxReplicas: 1
  webservice:
    minReplicas: 1
    maxReplicas: 1
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
  gitlab-shell:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    service:
      type: NodePort
      nodePort: 32022
