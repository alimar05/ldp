injector:
  # True if you want to enable vault agent injection.
  # @default: global.enabled
  enabled: false

server:  
  ingress:
    enabled: true
    # Optionally use ingressClassName instead of deprecated annotation.
    # See: https://kubernetes.io/docs/concepts/services-networking/ingress/#deprecated-annotation
    ingressClassName: nginx
    hosts:
      - host: vault.local
    tls:
      - secretName: wildcard-local-tls
        hosts:
          - vault.local

  extraSecretEnvironmentVars:
    - envName: VAULT_TOKEN
      secretName: vault-root-token
      secretKey: VAULT_ROOT_TOKEN
    - envName: VAULT_UNSEAL_KEY_1
      secretName: vault-unseal-keys
      secretKey: VAULT_UNSEAL_KEY_1
    - envName: VAULT_UNSEAL_KEY_2
      secretName: vault-unseal-keys
      secretKey: VAULT_UNSEAL_KEY_2
    - envName: VAULT_UNSEAL_KEY_3
      secretName: vault-unseal-keys
      secretKey: VAULT_UNSEAL_KEY_3
    - envName: KEYCLOAK_CLIENT_SECRET
      secretName: vault-keycloak-client-secret
      secretKey: KEYCLOAK_CLIENT_SECRET

  postStart:
    - /bin/sh
    - -c
    - |
      sleep 5;
      for i in $(seq 1 30); do
        vault status >/dev/null 2>&1;
        [ $? -ne 1 ] && break;
        sleep 2;
      done;

      # Выполняется unseal vault
      vault operator unseal "$VAULT_UNSEAL_KEY_1" >/dev/null 2>&1;
      vault operator unseal "$VAULT_UNSEAL_KEY_2" >/dev/null 2>&1;
      vault operator unseal "$VAULT_UNSEAL_KEY_3" >/dev/null 2>&1;
      
      # Настраивается подключение к k8s для vault
      vault write auth/kubernetes/config \
        kubernetes_host="https://kubernetes.default.svc:443" \
        kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
        token_reviewer_jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token;

      # Настройка VaultBackend для airflow

      # Создаётся политика доступа к airflow
      echo 'path "airflow/data/connections/*" {
        capabilities = ["read", "list"]
      }' | vault policy write airflow-policy -;

      # Создаётся роль для airflow
      vault write auth/kubernetes/role/airflow-role \
        bound_service_account_names="airflow-worker,airflow-scheduler,airflow-api-server" \
        bound_service_account_namespaces="airflow" \
        policies="airflow-policy";

      # Для примера создаётся connection для airflow
      vault kv put airflow/connections/pg_default conn_type="postgres" host="postgresql.postgresql.svc.cluster.local" database="postgres" login="postgres" password="postgres" port="5432";

      # Настройка keycloak согласно https://developer.hashicorp.com/vault/tutorials/auth-methods/oidc-auth#enable-oidc-auth-method

      # Включается метод аутентификации oidc по дефолтному пути, если он не включен
      if ! vault auth list 2>/dev/null | grep -q "^oidc/"; then
        vault auth enable oidc >/dev/null 2>&1;
      fi

      # Настраивается подключение к keycloak
      vault write auth/oidc/config \
        oidc_discovery_url="https://keycloak.local/realms/master" \
        oidc_client_id="vault" \
        oidc_client_secret="$KEYCLOAK_CLIENT_SECRET" \
        default_role="keycloak";

      # Создаётся политика доступа к keycloak
      echo 'path "*" {
        capabilities = ["create", "read", "update", "delete", "list", "sudo"]
      }' | vault policy write keycloak-policy -;

      # Создаётся роль для keycloak
      vault write auth/oidc/role/keycloak \
        bound_audiences="vault" \
        user_claim="sub" \
        allowed_redirect_uris="http://localhost:8250/oidc/callback" \
        allowed_redirect_uris="https://vault.local/ui/vault/auth/oidc/oidc/callback" \
        token_policies="keycloak-policy"; 

  standalone:
    enabled: true

    # config is a raw string of default configuration when using a Stateful
    # deployment. Default is to use a PersistentVolumeClaim mounted at /vault/data
    # and store data there. This is only used when using a Replica count of 1, and
    # using a stateful set. Supported formats are HCL and JSON.

    # Note: Configuration files are stored in ConfigMaps so sensitive data
    # such as passwords should be either mounted through extraSecretEnvironmentVars
    # or through a Kube secret. For more information see:
    # https://developer.hashicorp.com/vault/docs/platform/k8s/helm/run#protecting-sensitive-vault-configurations
    config: |-
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
      }
      
      storage "file" {
        path = "/vault/data"
      }
